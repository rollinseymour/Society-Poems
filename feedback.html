<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Send feedback · Society Poems</title>
  <link rel="icon" href="/Images/Untitled1.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/main.css" />
  <script>
    (function () { try { var t = localStorage.getItem("sp-theme"); if (!t) t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"; document.documentElement.setAttribute("data-theme", t); } catch (e) {} })();
  </script>
</head>
<body data-page="feedback" class="protected">
  <a class="skip-link" href="#main">Skip to content</a>
  <div id="site-header"></div>

  <main id="main" class="section">
    <div class="container" style="max-width:680px;">
      <div class="page-head">
        <span class="eyebrow">We're listening</span>
        <h1>Send feedback</h1>
        <p class="lead">Found a bug, have an idea, or want to tell us how Society Poems is feeling lately? We read everything.</p>
      </div>

      <div id="fb-msg" class="msg-box"></div>

      <form class="form-card" id="fb-form">
        <div class="field">
          <label>From</label>
          <div class="input-row">
            <span class="avatar" id="fb-avatar" style="width:36px;height:36px;font-size:.8rem;">?</span>
            <span id="fb-from" style="font-weight:600;">…</span>
          </div>
        </div>
        <div class="field">
          <label for="fb-message">Your message</label>
          <textarea class="input" id="fb-message" rows="7" placeholder="Tell us anything…" required></textarea>
        </div>
        <button type="submit" id="fb-btn" class="btn btn-primary btn-lg btn-block">Send feedback</button>
      </form>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="/assets/js/firebase-config.js"></script>
  <script src="/assets/js/shell.js"></script>
  <script>
    (function () {
      "use strict";
      var db = window.SP.db;
      var TS = firebase.database.ServerValue.TIMESTAMP;
      var me = null, profile = null;
      function msg(type, text) {
        var el = document.getElementById("fb-msg");
        el.className = "msg-box show " + type;
        el.textContent = text;
        if (type !== "success") setTimeout(function () { el.className = "msg-box"; }, 6000);
      }
      window.SP.requireAuth(function (user, prof) {
        me = user; profile = prof;
        document.getElementById("fb-from").textContent = prof.username + " · " + (prof.email || user.email || "");
        document.getElementById("fb-avatar").textContent = window.SP.initials(prof.username);
      });
      document.getElementById("fb-form").addEventListener("submit", function (e) {
        e.preventDefault();
        if (!me || !profile) return;
        var message = document.getElementById("fb-message").value.trim();
        if (!message) return msg("error", "Please write a message first.");
        var btn = document.getElementById("fb-btn");
        btn.disabled = true; btn.textContent = "Sending…";
        db.ref("feedback").push({
          uid: me.uid,
          username: profile.username,
          email: profile.email || me.email || "",
          message: message,
          timestamp: TS,
        }).then(function () {
          msg("success", "Thank you — your feedback means a lot 💛");
          document.getElementById("fb-message").value = "";
        }).catch(function () {
          msg("error", "Something went wrong. Please try again.");
        }).finally(function () {
          btn.disabled = false; btn.textContent = "Send feedback";
        });
      });
    })();
  </script>
</body>
</html>
