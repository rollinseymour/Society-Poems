<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your profile · Society Poems</title>
  <link rel="icon" href="/Images/Untitled1.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/main.css" />
  <script>
    (function () { try { var t = localStorage.getItem("sp-theme"); if (!t) t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"; document.documentElement.setAttribute("data-theme", t); } catch (e) {} })();
  </script>
</head>
<body data-page="profile" class="protected">
  <a class="skip-link" href="#main">Skip to content</a>
  <div id="site-header"></div>

  <main id="main" class="section">
    <div class="container" style="max-width:820px;">
      <div class="profile-head">
        <span class="avatar profile-avatar" id="p-avatar">?</span>
        <div style="flex:1;">
          <h1 id="p-username">…</h1>
          <div class="profile-meta">
            <span id="p-joined"></span>
            <span id="p-email"></span>
          </div>
          <div class="profile-stats">
            <div class="stat"><b id="p-count">0</b><span>Stories</span></div>
            <div class="stat"><b id="p-support">0</b><span>Support received</span></div>
          </div>
        </div>
      </div>

      <div style="display:flex;gap:.75rem;flex-wrap:wrap;margin:1.5rem 0 2.5rem;">
        <a href="upload" class="btn btn-primary">Share a new story</a>
        <button type="button" class="btn btn-ghost" data-action="logout">Log out</button>
      </div>

      <h2 class="section-title" style="text-align:left;font-size:1.6rem;margin-bottom:1.25rem;">Your stories</h2>
      <div id="my-feed" class="feed"><div class="spinner"></div></div>
      <div id="my-empty" class="empty hidden">
        <div class="ico">🌱</div>
        <h3>You haven't shared yet</h3>
        <p>When you're ready, your stories will gather here.</p>
        <a href="upload" class="btn btn-primary mt-1">Share your first story</a>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="/assets/js/firebase-config.js"></script>
  <script src="/assets/js/shell.js"></script>
  <script src="/assets/js/pages/profile.js"></script>
</body>
</html>
