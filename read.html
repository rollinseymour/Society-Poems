<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Read stories · Society Poems</title>
  <meta name="description" content="Read stories shared by the Society Poems community — browse by topic and respond with support." />
  <link rel="icon" href="/Images/Untitled1.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/main.css" />
  <script>
    (function () { try { var t = localStorage.getItem("sp-theme"); if (!t) t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"; document.documentElement.setAttribute("data-theme", t); } catch (e) {} })();
  </script>
</head>
<body data-page="read">
  <a class="skip-link" href="#main">Skip to content</a>
  <div id="site-header"></div>

  <main id="main" class="section">
    <div class="container">
      <div class="page-head" id="page-head">
        <span class="eyebrow">From the community</span>
        <h1>Read stories</h1>
        <p class="lead">Real words from real people. Browse by topic, and when something moves you, respond with kindness.</p>
      </div>

      <div class="toolbar">
        <div class="chip-row" id="topic-chips"></div>
        <div class="segmented" id="sort" role="tablist" aria-label="Sort stories">
          <button data-sort="new" class="active">Newest</button>
          <button data-sort="old">Oldest</button>
          <button data-sort="support">Most supported</button>
        </div>
      </div>

      <div id="feed" class="feed"><div class="spinner" aria-label="Loading stories"></div></div>

      <div id="empty" class="empty hidden">
        <div class="ico">🕊️</div>
        <h3>No stories here yet</h3>
        <p>Be the first to share something in this space.</p>
        <a href="upload" class="btn btn-primary mt-1">Share your story</a>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="/assets/js/firebase-config.js"></script>
  <script src="/assets/js/shell.js"></script>
  <script src="/assets/js/pages/read.js"></script>
</body>
</html>
