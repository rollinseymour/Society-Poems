<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A story · Society Poems</title>
  <link rel="icon" href="/Images/Untitled1.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/main.css" />
  <script>
    (function () { try { var t = localStorage.getItem("sp-theme"); if (!t) t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"; document.documentElement.setAttribute("data-theme", t); } catch (e) {} })();
  </script>
</head>
<body data-page="read">
  <a class="skip-link" href="#main">Skip to content</a>
  <div id="site-header"></div>

  <main id="main" class="section">
    <div class="container article-wrap">
      <a href="read" class="back-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
        All stories
      </a>

      <div id="post-loading"><div class="spinner"></div></div>

      <article class="article" id="post" hidden>
        <div class="article-topic" id="post-badges"></div>
        <div class="article-head">
          <span class="avatar" id="post-avatar">?</span>
          <div class="meta">
            <b id="post-author">—</b>
            <span id="post-time"></span>
          </div>
        </div>

        <div id="post-cw" class="cw-veil" hidden>
          <div class="cw-tag">Content warning</div>
          <p id="post-cw-text"></p>
          <button class="btn btn-soft btn-sm" id="reveal-btn">Show story</button>
        </div>
        <div class="article-body" id="post-body" hidden></div>

        <div class="reaction-bar" id="reaction-bar">
          <button class="reaction-btn" data-rx="heart"><span class="emoji">❤</span> Heart <span class="count" id="c-heart">0</span></button>
          <button class="reaction-btn" data-rx="support"><span class="emoji">🤝</span> Support <span class="count" id="c-support">0</span></button>
          <button class="reaction-btn" data-rx="hug"><span class="emoji">🫂</span> Hug <span class="count" id="c-hug">0</span></button>
          <button class="reaction-btn report" id="report-btn">⚑ Report</button>
          <button class="reaction-btn danger hidden" id="delete-btn">🗑 Delete</button>
        </div>
      </article>

      <section class="comments" id="comments" hidden>
        <h3 class="comments-title">Support &amp; replies <span id="comment-count" class="muted"></span></h3>

        <form class="comment-form" id="comment-form">
          <span class="avatar" id="my-avatar" style="width:40px;height:40px;">?</span>
          <div class="grow">
            <textarea class="input" id="comment-input" rows="2" placeholder="Share something kind or supportive…" maxlength="1000"></textarea>
            <div style="text-align:right;margin-top:.5rem;">
              <button type="submit" class="btn btn-primary btn-sm">Post reply</button>
            </div>
          </div>
        </form>

        <div class="callout guest-prompt hidden" id="guest-prompt" style="margin-bottom:1.5rem;">
          <strong>Want to respond?</strong> <a href="login">Sign in</a> to leave a supportive reply or react to this story.
        </div>

        <div id="comment-list"></div>
      </section>
    </div>
  </main>

  <div id="site-footer"></div>

  <!-- Report modal -->
  <div class="overlay" id="report-modal">
    <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="report-title">
      <h3 id="report-title">Report this story</h3>
      <p class="sub">Thanks for helping keep Society Poems safe. What's the concern?</p>
      <div id="report-reasons">
        <label class="option"><input type="radio" name="reason" value="Harassment or bullying" /><span class="o-label">Harassment or bullying</span></label>
        <label class="option"><input type="radio" name="reason" value="Hate or harmful content" /><span class="o-label">Hate or harmful content</span></label>
        <label class="option"><input type="radio" name="reason" value="Spam or scam" /><span class="o-label">Spam or scam</span></label>
        <label class="option"><input type="radio" name="reason" value="Someone may be in danger" /><span class="o-label">Someone may be in danger</span></label>
        <label class="option"><input type="radio" name="reason" value="Other" /><span class="o-label">Other</span></label>
      </div>
      <textarea class="input" id="report-details" rows="3" placeholder="Add any details (optional)…" style="margin-top:.5rem;"></textarea>
      <div class="sheet-actions">
        <button class="btn btn-ghost" id="report-cancel">Cancel</button>
        <button class="btn btn-primary" id="report-submit">Submit report</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="/assets/js/firebase-config.js"></script>
  <script src="/assets/js/shell.js"></script>
  <script src="/assets/js/pages/post.js"></script>
</body>
</html>
